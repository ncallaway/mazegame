<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mazegame</title>
  <link rel="stylesheet" href="game.css">
</head>

<body style="position: relative; margin: 0;">
  <canvas id='game-output'></canvas>
  <button id="next-level" type="button">Next level</button>
  <div class="score-bug">
    <span><strong class="level">Level 1</strong></span>
    <span><strong>Elapsed:</strong> <span class="elapsed">0:00</span></span>
    <span><strong>First move:</strong> <span class="first-move">0:00</span></span>
    <span><strong class="target"></strong></span>
  </div>
  <script src="game.js"></script>
</body>
</html>
